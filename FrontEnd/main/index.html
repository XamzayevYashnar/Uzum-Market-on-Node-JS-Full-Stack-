<html lang="en"> 
 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="./style.css">   
    <title>Uzum Market — O'zbekiston</title> 
    <link rel="icon" type="image/png" href="./image/uzum title.png"> 
 
     
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet"> 
</head> 
<body> 
    <header> 
        <div class="logo"> 
            <img src="./image/uzumlogo.png" alt="Uzum Market" width="30"> 
            <h1>UZUM MARKET</h1> 
        </div> 
        <div class="headermain"> 
            <div class="katalog"> 
                <img  src="./image/katalog.png" alt="Katalog" width="20"> 
                <p>Katalog</p> 
            </div> 
            <div class="search"> 
                <input type="text" name="" id="" placeholder="Mahsulot va turkumlar izlash" > 
                <img src="./image/search.png" alt="Search" width="15"> 
            </div> 
        </div> 
        <div class="headerfoot"> 
                <div class="kirish"> 
                    <img src="./image/kirish.png" alt="Kirish" width="18" height="20"> 
                    <p>Kirish</p> 
                </div> 
                <div class="saralangan"> 
                    <img src="./image/saralangan.png" alt="Saralangan" width="18" height="20"> 
                    <p>Saralangan</p> 
                </div> 
                <div class="savat"> 
                    <img src="./image/savat.png" alt="Savat" width="29" height="32"> 
                    <p>Savat</p> 
                </div> 
        </div> 
 
         
    </header> 
 
 
 
    <div id="content">Malumotlar Yuklanmoqda...</div> 
 
    <script src="./main.js"></script> 
</body> 
 
</html>
