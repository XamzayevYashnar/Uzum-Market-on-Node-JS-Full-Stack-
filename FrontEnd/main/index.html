<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Uzum Market — O'zbekiston</title>
    <link rel="icon" type="image/png" href="./image/uzum title.png">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">
            <img src="./image/uzumlogo.png" alt="Uzum Market" width="30">
            <h1>UZUM MARKET</h1>
        </div>
        <div class="headermain">
            <div class="katalog">
                <img src="./image/katalog.png" alt="Katalog" width="20">
                <p>Katalog</p>
            </div>
            <div class="search">
                <input type="text" name="" id="" placeholder="Mahsulot va turkumlar izlash">
                <img src="./image/search.png" alt="Search" width="15">
            </div>
        </div>
        <div class="headerfoot">
            <div class="kirish">
                <img src="./image/kirish.png" alt="Kirish" width="18" height="20">
                <a href="./sign_in/Sam.html" class=" kirish_link">Kirish</a>
            </div>
            <div class="saralangan">
                <img src="./image/saralangan.png" alt="Saralangan" width="18" height="20">
                <a href="">Saralangan</a>
            </div>
            <div class="savat">
                <img src="./image/savat.png" alt="Savat" width="29" height="32">
                <a href="">Savat</a>
            </div>
        </div>
    </header>
    <main>
        <div class="main">
            <div class="mahsulotlar">
                <p>Arzon narxlar kafolat</p>
                <p>Mebel</p>
                <p>Turizm baliq ovi va ovchilik</p>
                <p>Elektronika</p>
                <p>Maishi texnika</p>
                <p>Kiyim</p>
                <p>Poyabzallar</p>
                <p>Aksessuarlar</p>
                <p>Go'zallik va parvarish</p>
                <p>Salomatlik</p>
                <p>Yana</p>
            </div>
            <div class="slider">
                <div class="rasmAnimation">
                    <img src="./image/img.main/Screenshot 2026-07-19 at 00.27.56.png" class="slide" alt="">
                    <img src="./image/img.main/Screenshot 2026-07-19 at 00.28.23.png" class="slide" alt="">
                    <img src="./image/img.main/Screenshot 2026-07-19 at 00.28.37.png" class="slide" alt="">
                </div>
                <button class="prev">&#10094;</button>
                <button class="next">&#10095;</button>
            </div>

            <div class="pass">
                <div class=" teddy">
                    <img src="./image/img.main/teddy.jpg" alt="Teddy" width="40" height="35" style=" border-radius: 20px; margin-left: 30px;">
                    <p>Onalar va bolalar uchun</p>
                </div>
                <div class=" top">
                    <img src="./image/img.main/ball.png" alt="Futbol" width="30" style=" border-radius: 20px; margin-left: 90px;">
                    <p>Futbol</p>
                </div>
                <div class="kiyim">
                    <img src="./image/img.main/sweatr.avif" alt="Zamonaviy bozor" width="30" style=" border-radius: 20px; margin-left: 55px;">
                    <p>Zamonaviy bozor</p>
                </div>
                <div class="chilla">
                    <img src="./image/img.main/yoz.webp" alt="Chilla" width="40" height="40" style=" border-radius: 20px; margin-left: 100px;">
                    <p>Chilla</p>
                </div>
            </div>
        </div>
    </main>



    <div id="content">Malumotlar Yuklanmoqda...</div>

    <script src="./main.js"></script>
</body>

</html>
