<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Shadow</title>
</head>
<body>
    <div class="box">
        <h1>Market</h1>
        <form id="loginForm"> 
            <input class="inp" id="userName" type="text" placeholder="Full Name" required> 
            <input class="inp" id="password" type="password" placeholder="Password" required> 
            <button type="submit">Signup</button> 
        </form>
        <p>Already have an account? <a href="">Login</a></p>

        <script>
            async function loginHandler(userName, password) {
                try {
                    const result = await fetch('http://127.0.0.1:3000/api/users/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ userName, password }) 
                    });
                    
                    return await result.json();
                } catch (error) {
                    console.error("Ошибка сети или сервера:", error);
                }
            }

            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault(); 

                const userNameValue = document.getElementById('userName').value;
                const passwordValue = document.getElementById('password').value;

                if (userNameValue && passwordValue) {
                    const result = await loginHandler(userNameValue, passwordValue);
                    console.log("Ответ сервера:", result);
                }
            });
        </script>
    </div>
</body>
</html>
